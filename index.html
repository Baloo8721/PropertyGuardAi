<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Guard - Security Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070B11;
      --card: #111827;
      --border: #1E2D45;
      --borderBright: #2A4060;
      --accent: #00D4FF;
      --green: #00FF88;
      --greenDim: #00994D;
      --orange: #FF8C00;
      --red: #FF3B3B;
      --yellow: #FFD700;
      --purple: #A855F7;
      --text: #E8F0FE;
      --textMid: #8BA3C4;
      --textDim: #4A6080;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow-x: hidden; }
    .shell { display: flex; flex-direction: column; min-height: 100vh; max-width: 480px; margin: 0 auto; }
    .topbar { position: sticky; top: 0; z-index: 100; background: rgba(7,11,17,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-logo { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
    .topbar-logo span { color: var(--textDim); }
    .topbar-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--textMid); }
    .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    .pulse-dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .bottomnav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 100; background: rgba(13,20,32,0.96); backdrop-filter: blur(16px); border-top: 1px solid var(--border); display: flex; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 4px 12px; gap: 3px; cursor: pointer; transition: all 0.2s; font-size: 10px; color: var(--textDim); font-weight: 500; letter-spacing: 0.5px; position: relative; border: none; background: none; }
    .nav-item.active { color: var(--accent); }
    .nav-item.active .nav-icon { color: var(--accent); }
    .nav-icon { font-size: 20px; line-height: 1; }
    .nav-badge { position: absolute; top: 6px; right: calc(50% - 16px); background: var(--red); color: white; font-size: 9px; font-weight: 700; border-radius: 8px; padding: 1px 5px; min-width: 16px; text-align: center; }
    .content { flex: 1; padding: 12px 12px 90px; display: flex; flex-direction: column; gap: 12px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .card-header { padding: 12px 14px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .card-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--textMid); text-transform: uppercase; }
    .card-badge { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--accent); background: rgba(0,212,255,0.1); padding: 2px 8px; border-radius: 20px; }
    .hero { background: linear-gradient(135deg, #0D1F35 0%, #071525 60%, #0A1A2E 100%); border: 1px solid var(--borderBright); border-radius: 16px; padding: 16px; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; top: -40px; right: -40px; width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%); }
    .hero-date { font-size: 11px; color: var(--textDim); letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase; font-family: 'Space Mono', monospace; }
    .hero-title { font-size: 22px; font-weight: 800; margin-bottom: 12px; color: var(--green); }
    .hero-title.warn { color: var(--orange); }
    .hero-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .hero-stat { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px 8px; text-align: center; border: 1px solid rgba(255,255,255,0.04); }
    .hero-stat-val { font-size: 24px; font-weight: 800; font-family: 'Space Mono', monospace; line-height: 1; }
    .hero-stat-val.people { color: var(--accent); }
    .hero-stat-val.vehicles { color: var(--orange); }
    .hero-stat-val.animals { color: var(--green); }
    .hero-stat-val.alert { color: var(--red); }
    .hero-stat-lbl { font-size: 10px; color: var(--textDim); margin-top: 3px; letter-spacing: 0.5px; }
    .hero-bottom { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .hero-chip { font-size: 10px; padding: 4px 10px; border-radius: 20px; font-family: 'Space Mono', monospace; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: var(--textDim); }
    .hero-chip.green { border-color: var(--greenDim); color: var(--green); }
    .hero-chip.orange { border-color: rgba(255,140,0,0.4); color: var(--orange); }
    .alert-strip { border-radius: 10px; padding: 10px 12px; display: flex; align-items: flex-start; gap: 10px; border: 1px solid; margin: 10px; }
    .alert-strip.high { background: rgba(255,59,59,0.08); border-color: rgba(255,59,59,0.3); }
    .alert-strip.medium { background: rgba(255,140,0,0.08); border-color: rgba(255,140,0,0.3); }
    .alert-strip.low { background: rgba(255,215,0,0.06); border-color: rgba(255,215,0,0.2); }
    .alert-icon { font-size: 18px; line-height: 1; }
    .alert-msg { font-size: 13px; font-weight: 500; flex: 1; }
    .alert-strip.high .alert-msg { color: var(--red); }
    .alert-strip.medium .alert-msg { color: var(--orange); }
    .alert-time { font-size: 10px; color: var(--textDim); font-family: 'Space Mono', monospace; margin-top: 2px; }
    .alert-ack { font-size: 10px; padding: 3px 8px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--textDim); cursor: pointer; }
    .cam-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 10px; }
    .cam-cell { aspect-ratio: 16/10; border-radius: 8px; position: relative; overflow: hidden; cursor: pointer; border: 1.5px solid var(--border); background: #050A10; }
    .cam-visual { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
    .cam-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 4px 5px; background: linear-gradient(transparent, rgba(0,0,0,0.85)); }
    .cam-name { font-size: 8px; font-weight: 700; color: white; letter-spacing: 0.5px; }
    .cam-tag { font-size: 7px; color: var(--orange); font-family: 'Space Mono', monospace; }
    .cam-dot { position: absolute; top: 4px; right: 4px; width: 5px; height: 5px; border-radius: 50%; background: var(--red); animation: pulse 1.5s infinite; }
    .cam-dot.offline { background: var(--textDim); animation: none; }
    .event-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .event-row:last-child { border-bottom: none; }
    .event-icon-wrap { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; background: rgba(0,212,255,0.12); }
    .event-icon-wrap.vehicle { background: rgba(255,140,0,0.12); }
    .event-icon-wrap.animal { background: rgba(0,255,136,0.10); }
    .event-main { flex: 1; min-width: 0; }
    .event-label { font-size: 13px; font-weight: 600; }
    .event-meta { font-size: 10px; color: var(--textDim); margin-top: 1px; }
    .event-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .event-time { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--textDim); }
    .event-conf { font-size: 9px; color: var(--green); background: rgba(0,255,136,0.08); padding: 1px 6px; border-radius: 8px; }
    .plate-badge { font-family: 'Space Mono', monospace; font-size: 10px; background: rgba(255,140,0,0.12); color: var(--orange); padding: 1px 6px; border-radius: 4px; border: 1px solid rgba(255,140,0,0.25); margin-left: 4px; }
    .wifi-zone { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .wifi-zone:last-child { border-bottom: none; }
    .wifi-name { font-size: 13px; font-weight: 500; flex: 1; }
    .wifi-bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .wifi-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--green)); }
    .wifi-status { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--textDim); }
    .wifi-status.active { color: var(--green); }
    .section-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--textDim); text-transform: uppercase; padding: 0 12px; margin-bottom: 8px; margin-top: 8px; }
    .drone-card { margin: 10px; border-radius: 10px; overflow: hidden; background: rgba(168,85,247,0.06); border: 1px solid rgba(168,85,247,0.2); padding: 14px; }
    .drone-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .drone-title { font-size: 13px; font-weight: 700; color: var(--purple); }
    .drone-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; border: 1px solid rgba(168,85,247,0.3); color: var(--purple); font-family: 'Space Mono', monospace; }
    .drone-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .drone-stat { text-align: center; }
    .drone-stat-val { font-size: 16px; font-weight: 800; color: var(--purple); font-family: 'Space Mono', monospace; }
    .drone-stat-lbl { font-size: 9px; color: var(--textDim); margin-top: 2px; }
    .drone-btn { width: 100%; margin-top: 10px; padding: 8px; border-radius: 8px; background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3); color: var(--purple); font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: 1px; }
    .threedgs { margin: 10px; border-radius: 10px; overflow: hidden; background: linear-gradient(135deg, #050D18 0%, #0A1628 100%); border: 1px solid var(--border); height: 200px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; position: relative; }
    .threedgs-label { font-size: 12px; color: var(--textMid); font-weight: 600; letter-spacing: 1px; }
    .threedgs-sub { font-size: 10px; color: var(--textDim); font-family: 'Space Mono', monospace; }
    .threedgs-btn { margin-top: 8px; padding: 6px 16px; border-radius: 8px; background: rgba(0,212,255,0.12); border: 1px solid rgba(0,212,255,0.3); color: var(--accent); font-size: 11px; font-weight: 600; cursor: pointer; }
    .filter-row { display: flex; gap: 6px; padding: 0 12px; overflow-x: auto; }
    .filter-chip { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; border: 1px solid var(--border); color: var(--textDim); background: transparent; }
    .filter-chip.active { background: rgba(0,212,255,0.12); border-color: rgba(0,212,255,0.4); color: var(--accent); }
    .animal-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .animal-row:last-child { border-bottom: none; }
    .animal-emoji { font-size: 24px; }
    .animal-name { font-size: 13px; font-weight: 600; }
    .animal-visits { font-size: 10px; color: var(--textDim); margin-top: 1px; }
    .routine-badge { font-size: 9px; color: var(--green); background: rgba(0,255,136,0.1); padding: 1px 7px; border-radius: 10px; border: 1px solid rgba(0,255,136,0.2); }
    .new-badge { font-size: 9px; color: var(--orange); background: rgba(255,140,0,0.1); padding: 1px 7px; border-radius: 10px; border: 1px solid rgba(255,140,0,0.2); }
    .vehicle-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .vehicle-plate-big { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; min-width: 80px; text-align: center; }
    .vehicle-plate-big.unknown { border-color: rgba(255,59,59,0.3); color: var(--red); }
    .vehicle-info { flex: 1; }
    .vehicle-make { font-size: 13px; font-weight: 600; }
    .vehicle-label { font-size: 10px; color: var(--textDim); margin-top: 1px; }
    .sys-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px; }
    .sys-stat { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 12px; border: 1px solid rgba(255,255,255,0.04); }
    .sys-val { font-size: 20px; font-weight: 800; font-family: 'Space Mono', monospace; }
    .sys-val.green { color: var(--green); }
    .sys-val.accent { color: var(--accent); }
    .sys-val.orange { color: var(--orange); }
    .sys-lbl { font-size: 10px; color: var(--textDim); margin-top: 3px; }
    .chat-messages { padding: 12px; display: flex; flex-direction: column; gap: 10px; max-height: 300px; overflow-y: auto; }
    .chat-bubble { max-width: 85%; padding: 10px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
    .chat-bubble.assistant { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.15); align-self: flex-start; border-radius: 4px 12px 12px 12px; }
    .chat-bubble.user { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); align-self: flex-end; border-radius: 12px 4px 12px 12px; }
    .chat-who { font-size: 9px; letter-spacing: 1px; font-weight: 700; margin-bottom: 4px; }
    .chat-who.ai { color: var(--accent); }
    .chat-who.me { color: var(--textDim); }
    .chat-input-row { display: flex; gap: 8px; padding: 0 12px 12px; }
    .chat-input { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; color: var(--text); font-size: 13px; font-family: 'Outfit', sans-serif; outline: none; }
    .chat-input::placeholder { color: var(--textDim); }
    .chat-send { width: 38px; height: 38px; border-radius: 10px; background: rgba(0,212,255,0.15); border: 1px solid rgba(0,212,255,0.3); color: var(--accent); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .cam-full-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.96); display: none; flex-direction: column; }
    .cam-full-overlay.show { display: flex; }
    .cam-full-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .cam-full-title { font-size: 15px; font-weight: 700; }
    .cam-full-close { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.08); border: none; color: white; font-size: 16px; cursor: pointer; }
    .cam-full-view { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .cam-full-screen { width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); position: relative; background: #050A10; }
    .cam-full-info { padding: 12px 16px; display: flex; gap: 10px; flex-wrap: wrap; }
    .cam-info-chip { padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }
    .cam-info-chip.live { background: rgba(255,59,59,0.15); color: var(--red); border: 1px solid rgba(255,59,59,0.3); }
    .cam-info-chip.res { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.25); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const CAMERAS = [
      { id: 1, name: "Front-Left", zone: "perimeter", status: "live", threat: null },
      { id: 2, name: "Front-Right", zone: "perimeter", status: "live", threat: null },
      { id: 3, name: "Driveway", zone: "entry", status: "live", threat: "vehicle" },
      { id: 4, name: "Front Door", zone: "entry", status: "live", threat: null },
      { id: 5, name: "Back-Left", zone: "backyard", status: "live", threat: null },
      { id: 6, name: "Back-Right", zone: "backyard", status: "live", threat: null },
      { id: 7, name: "Backyard", zone: "backyard", status: "live", threat: "animal" },
      { id: 8, name: "Side Gate", zone: "perimeter", status: "offline", threat: null },
      { id: 9, name: "Feeder Cam", zone: "wildlife", status: "live", threat: "animal" },
    ];
    const EVENTS = [
      { id: 1, time: "08:47", type: "vehicle", label: "Toyota Camry", plate: "7XBK492", cam: "Driveway", confidence: 0.94, routine: false, read: false },
      { id: 2, time: "08:31", type: "animal", label: "Squirrel #3 (Patches)", cam: "Feeder Cam", confidence: 0.88, routine: true, read: false },
      { id: 3, time: "07:55", type: "person", label: "Person", cam: "Front-Right", confidence: 0.97, read: true },
      { id: 4, time: "07:44", type: "animal", label: "Cardinal (male)", cam: "Feeder Cam", confidence: 0.82, read: true },
      { id: 5, time: "07:12", type: "vehicle", label: "FedEx Truck", plate: "FL-FEDEX", cam: "Driveway", confidence: 0.91, read: true },
      { id: 6, time: "06:38", type: "animal", label: "Raccoon", cam: "Back-Left", confidence: 0.86, read: true },
      { id: 7, time: "03:14", type: "person", label: "Unknown Person", cam: "Side Gate", confidence: 0.79, alert: true, read: false },
      { id: 8, time: "02:48", type: "animal", label: "Opossum", cam: "Backyard", confidence: 0.91, read: true },
    ];
    const ANIMALS = [
      { name: "Patches (Squirrel #3)", visits: 4, lastSeen: "08:31", icon: "🐿️", routine: true },
      { name: "Cardinal (male)", visits: 2, lastSeen: "07:44", icon: "🐦", routine: false },
      { name: "Raccoon", visits: 1, lastSeen: "06:38", icon: "🦝", routine: false },
      { name: "Opossum", visits: 1, lastSeen: "02:48", icon: "🐾", routine: false },
      { name: "Blue Jay", visits: 3, lastSeen: "07:50", icon: "🐦‍⬛", routine: true },
    ];
    const VEHICLES = [
      { plate: "7XBK492", make: "Toyota Camry", visits: 2, lastSeen: "08:47", known: true, label: "Neighbor — Dave" },
      { plate: "FL-FEDEX", make: "FedEx Truck", visits: 1, lastSeen: "07:12", known: true, label: "Delivery" },
      { plate: "3RNZ019", make: "Unknown Sedan", visits: 1, lastSeen: "06:01", known: false, label: null },
    ];
    const WIFI_ZONES = [
      { zone: "Front Entry", active: false, lastMotion: "07:55", level: 0 },
      { zone: "Living Room", active: true, lastMotion: "08:51", level: 85 },
      { zone: "Garage", active: false, lastMotion: "07:12", level: 0 },
      { zone: "Backyard", active: false, lastMotion: "06:38", level: 10 },
      { zone: "Side Gate", active: false, lastMotion: "03:14", level: 5 },
    ];
    const ALERTS = [
      { id: 1, severity: "high", message: "Unknown person at Side Gate — 3:14 AM", time: "03:14", acked: false },
      { id: 2, severity: "medium", message: "Camera 8 (Side Gate) offline", time: "06:00", acked: false },
      { id: 3, severity: "low", message: "Unknown vehicle (3RNZ019) passed twice", time: "06:01", acked: true },
    ];
    const SUMMARY = { date: "Tuesday, May 5", totalEvents: 41, people: 3, vehicles: 6, animals: 14, anomalies: 1, systemHealth: 88, uptime: "23h 51m", rec: "12.4", threeD: "02:00 AM" };
    let tab = "home";
    let selectedCam = null;
    let droneArmed = false;
    let chatInput = "";
    let chatMessages = [{ role: "assistant", text: "Good morning. Here's your overnight summary: 1 anomalous person detected at 3:14 AM near the side gate — confidence 79%, no plate, departed within 4 minutes. Cam 8 went offline at ~6 AM. Patches (Squirrel #3) arrived at 8:31 on schedule — routine confirmed. All other activity nominal." }];
    let chatLoading = false;
    let eventFilter = "all";
    let alerts = [...ALERTS];
    function render() {
      const unreadAlerts = alerts.filter(a => !a.acked).length;
      const unreadEvents = EVENTS.filter(e => !e.read).length;
      const liveCams = CAMERAS.filter(c => c.status === "live").length;
      let html = `
        <div class="shell">
          <div class="topbar">
            <div class="topbar-logo">PROPERTY<span>·</span>GUARD</div>
            <div class="topbar-status">
              <div class="pulse-dot ${CAMERAS.some(c => c.status === "offline") ? "red" : ""}"></div>
              ${liveCams}/${CAMERAS.length} LIVE
            </div>
          </div>
          <div class="content">
      `;
      if (tab === "home") {
        html += `
          <div class="hero">
            <div class="hero-date">${SUMMARY.date}</div>
            <div class="hero-title ${unreadAlerts > 0 ? 'warn' : ''}">${unreadAlerts > 0 ? '⚠ ' + unreadAlerts + ' Alert' + (unreadAlerts > 1 ? 's' : '') : 'All Clear'}</div>
            <div class="hero-grid">
              <div class="hero-stat"><div class="hero-stat-val people">${SUMMARY.people}</div><div class="hero-stat-lbl">People</div></div>
              <div class="hero-stat"><div class="hero-stat-val vehicles">${SUMMARY.vehicles}</div><div class="hero-stat-lbl">Vehicles</div></div>
              <div class="hero-stat"><div class="hero-stat-val animals">${SUMMARY.animals}</div><div class="hero-stat-lbl">Animals</div></div>
              <div class="hero-stat"><div class="hero-stat-val alert">${SUMMARY.anomalies}</div><div class="hero-stat-lbl">Anomalies</div></div>
              <div class="hero-stat"><div class="hero-stat-val">${SUMMARY.totalEvents}</div><div class="hero-stat-lbl">Events</div></div>
              <div class="hero-stat"><div class="hero-stat-val">${SUMMARY.systemHealth}%</div><div class="hero-stat-lbl">Health</div></div>
            </div>
            <div class="hero-bottom">
              <span class="hero-chip green">↑ ${SUMMARY.uptime}</span>
              <span class="hero-chip orange">3DGS @ ${SUMMARY.threeD}</span>
              <span class="hero-chip">${SUMMARY.rec}GB</span>
            </div>
          </div>
        `;
        if (alerts.some(a => !a.acked)) {
          html += `<div class="section-label">Active Alerts</div>`;
          alerts.filter(a => !a.acked).forEach(a => {
            html += `<div class="alert-strip ${a.severity}"><div class="alert-icon">${a.severity === 'high' ? '🚨' : a.severity === 'medium' ? '⚠️' : 'ℹ️'}</div><div class="alert-msg">${a.message}</div><button class="alert-ack" onclick="ackAlert(${a.id})">ACK</button></div>`;
          });
        }
        html += `
          <div class="card">
            <div class="card-header"><span class="card-title">Live Cameras</span><span class="card-badge" onclick="tab='cameras';render()">View All →</span></div>
            <div class="cam-grid">
              ${CAMERAS.slice(0,6).map(cam => `
                <div class="cam-cell" onclick="selectedCam=${cam.id};render()">
                  <div class="cam-visual"><div style="width:100%;height:100%;background:linear-gradient(180deg,#050A18,#0A1525)"></div></div>
                  <div class="cam-dot ${cam.status}"></div>
                  <div class="cam-overlay"><div class="cam-name">${cam.name}</div>${cam.threat ? '<div class="cam-tag">▲ ' + cam.threat + '</div>' : ''}</div>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">Recent Activity</span><span class="card-badge" onclick="tab='events';render()">All Events →</span></div>
            ${EVENTS.slice(0,4).map(ev => `
              <div class="event-row">
                <div class="event-icon-wrap ${ev.type}">${ev.type === 'person' ? '🧍' : ev.type === 'vehicle' ? '🚗' : '🐾'}</div>
                <div class="event-main"><div class="event-label">${ev.label}${ev.plate ? '<span class="plate-badge">' + ev.plate + '</span>' : ''}</div><div class="event-meta">${ev.cam}</div></div>
                <div class="event-right"><span class="event-time">${ev.time}</span><span class="event-conf">${Math.round(ev.confidence*100)}%</span></div>
              </div>
            `).join('')}
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">WiFi Presence</span><span class="card-badge">ESP32</span></div>
            ${WIFI_ZONES.map(z => `
              <div class="wifi-zone"><div>${z.active ? '📡' : '·'}</div><div class="wifi-name">${z.zone}</div><div class="wifi-bar-wrap"><div class="wifi-bar" style="width:${z.level}%"></div></div><div class="wifi-status ${z.active?'active':''}">${z.active?'ACTIVE':z.lastMotion}</div></div>
            `).join('')}
          </div>
        `;
      }
      if (tab === "cameras") {
        html += `
          <div class="section-label">All 9 Cameras — Tap to Expand</div>
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:0 12px;">
            ${CAMERAS.map(cam => `
              <div class="cam-cell" style="aspect-ratio:16/10" onclick="selectedCam=${cam.id};render()">
                <div class="cam-visual"><div style="width:100%;height:100%;background:linear-gradient(180deg,#050A18,#0A1525)"></div></div>
                <div style="position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:${cam.status==='live'?'var(--red)':'var(--textDim)'}"></div>
                <div class="cam-overlay"><div class="cam-name">CAM ${cam.id} · ${cam.name}</div>${cam.threat?'<div class="cam-tag">▲ '+cam.threat.toUpperCase()+' DETECTED</div>':''}${cam.status==='offline'?'<div class="cam-tag" style="color:var(--red)">● OFFLINE</div>':''}</div>
              </div>
            `).join('')}
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">3D Property Map</span><span class="card-badge">3DGS · Last 2:00 AM</span></div>
            <div class="threedgs">
              <div style="font-size:28px">🏠</div>
              <div class="threedgs-label">GAUSSIAN SPLAT VIEW</div>
              <div class="threedgs-sub">Updated nightly · Next: 02:00 AM</div>
              <button class="threedgs-btn">Open 3D Viewer →</button>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">Drone Patrol</span><span class="card-badge" style="color:var(--purple)">STANDBY</span></div>
            <div class="drone-card" style="margin:0;border-radius:0;border:none;border-top:1px solid var(--border)">
              <div class="drone-header"><span style="font-size:20px">🚁</span><div class="drone-title">ArduPilot UAV — Unit 1</div><div class="drone-status">${droneArmed?'ARMED':'STANDBY'}</div></div>
              <div class="drone-grid">
                <div class="drone-stat"><div class="drone-stat-val">94%</div><div class="drone-stat-lbl">Battery</div></div>
                <div class="drone-stat"><div class="drone-stat-val">0mph</div><div class="drone-stat-lbl">Speed</div></div>
                <div class="drone-stat"><div class="drone-stat-val">N/A</div><div class="drone-stat-lbl">Altitude</div></div>
              </div>
              <button class="drone-btn" onclick="droneArmed=!droneArmed;render()">${droneArmed?'⬛ DISARM':'▶ ARM + LAUNCH PATROL'}</button>
            </div>
          </div>
        `;
      }
      if (tab === "events") {
        html += `
          <div class="filter-row">
            ${['all','person','vehicle','animal'].map(f => `<button class="filter-chip ${eventFilter===f?'active':''}" onclick="eventFilter='${f}';render()">${f==='all'?'All':f==='person'?'🧍':f==='vehicle'?'🚗':'🐾'}</button>`).join('')}
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">Today — ${SUMMARY.date}</span><span class="card-badge">${EVENTS.length} events</span></div>
            ${EVENTS.map(ev => `
              <div class="event-row">
                <div class="event-icon-wrap ${ev.type}">${ev.type==='person'?'🧍':ev.type==='vehicle'?'🚗':'🐾'}</div>
                <div class="event-main"><div class="event-label">${ev.label}${ev.plate?'<span class="plate-badge">'+ev.plate+'</span>':''}</div><div class="event-meta">${ev.cam}${ev.routine?' · On routine ✓':''}</div></div>
                <div class="event-right"><span class="event-time">${ev.time}</span><span class="event-conf">${Math.round(ev.confidence*100)}%</span></div>
              </div>
            `).join('')}
          </div>
        `;
      }
      if (tab === "intel") {
        html += `
          <div class="card">
            <div class="card-header"><span class="card-title">Wildlife Today</span><span class="card-badge">${ANIMALS.length} species</span></div>
            ${ANIMALS.map(a => `
              <div class="animal-row"><div class="animal-emoji">${a.icon}</div><div style="flex:1"><div class="animal-name">${a.name}</div><div class="animal-visits">${a.visits} visit${a.visits>1?'s':''} · Last ${a.lastSeen}</div></div><div><span class="${a.routine?'routine-badge':'new-badge'}">${a.routine?'On routine':'New sighting'}</span></div></div>
            `).join('')}
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">Vehicles Today</span><span class="card-badge">LPR Active</span></div>
            ${VEHICLES.map(v => `
              <div class="vehicle-row"><div class="vehicle-plate-big ${v.known?'':'unknown'}">${v.plate}</div><div class="vehicle-info"><div class="vehicle-make">${v.make}</div><div class="vehicle-label">${v.label||'⚠ Unknown'} · ${v.visits}x · ${v.lastSeen}</div></div>${!v.known?'<div style="font-size:18px">🚨</div>':''}</div>
            `).join('')}
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">System Health</span><span class="card-badge">${SUMMARY.uptime}</span></div>
            <div class="sys-grid">
              <div class="sys-stat"><div class="sys-val green">${SUMMARY.systemHealth}%</div><div class="sys-lbl">Overall Health</div></div>
              <div class="sys-stat"><div class="sys-val accent">8/9</div><div class="sys-lbl">Cameras Online</div></div>
              <div class="sys-stat"><div class="sys-val green">${SUMMARY.rec}GB</div><div class="sys-lbl">Recording Used</div></div>
              <div class="sys-stat"><div class="sys-val accent">14W</div><div class="sys-lbl">Power Draw</div></div>
              <div class="sys-stat"><div class="sys-val green">N100</div><div class="sys-lbl">CPU — 34%</div></div>
              <div class="sys-stat"><div class="sys-val orange">1</div><div class="sys-lbl">Cam Offline</div></div>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">WiFi CSI Presence</span><span class="card-badge">5 ESP32</span></div>
            ${WIFI_ZONES.map(z => `
              <div class="wifi-zone"><div style="font-size:16px">${z.active?'🟢':'⚫'}</div><div class="wifi-name">${z.zone}</div><div class="wifi-bar-wrap"><div class="wifi-bar" style="width:${z.level}%"></div></div><div class="wifi-status ${z.active?'active':''}">${z.active?'ACTIVE':z.lastMotion}</div></div>
            `).join('')}
          </div>
        `;
      }
      if (tab === "guard") {
        html += `
          ${alerts.some(a => !a.acked) ? '<div class="section-label">Active Alerts</div>' : ''}
          ${alerts.filter(a => !a.acked).map(a => `<div class="alert-strip ${a.severity}"><div class="alert-icon">${a.severity==='high'?'🚨':a.severity==='medium'?'⚠️':'ℹ️'}</div><div class="alert-msg">${a.message}</div><button class="alert-ack" onclick="ackAlert(${a.id})">ACK</button></div>`).join('')}
          <div class="card" style="margin-bottom:90px">
            <div class="card-header"><span class="card-title">◆ GUARDIAN — AI Security Boss</span><span class="card-badge" style="color:var(--green);background:rgba(0,255,136,0.08)">ONLINE</span></div>
            <div class="chat-messages">
              ${chatMessages.map(m => `<div class="chat-bubble ${m.role}"><div class="chat-who ${m.role==='assistant'?'ai':'me'}">${m.role==='assistant'?'◆ GUARDIAN':'YOU'}</div>${m.text}</div>`).join('')}
              ${chatLoading ? '<div class="chat-bubble assistant"><div class="chat-who ai">◆ GUARDIAN</div><span style="color:var(--textDim)">Thinking...</span></div>' : ''}
            </div>
            <div class="chat-input-row">
              <input class="chat-input" placeholder="Ask Guardian about events, animals, vehicles..." value="${chatInput}" oninput="chatInput=this.value" onkeydown="if(event.key==='Enter')sendChat()">
              <button class="chat-send" onclick="sendChat()">↑</button>
            </div>
          </div>
        `;
      }
      html += `
          </div>
          <nav class="bottomnav">
            ${[{id:"home",icon:"⌂",label:"HOME"},{id:"cameras",icon:"◉",label:"CAMS"},{id:"events",icon:"≡",label:"EVENTS",badge:unreadEvents},{id:"intel",icon:"◈",label:"INTEL"},{id:"guard",icon:"◆",label:"GUARD",badge:unreadAlerts}].map(n => `
              <button class="nav-item ${tab===n.id?'active':''}" onclick="tab='${n.id}';render()">
                ${n.badge?'<span class="nav-badge">'+n.badge+'</span>':''}
                <span class="nav-icon">${n.icon}</span>
                <span>${n.label}</span>
              </button>
            `).join('')}
          </nav>
        `;
      if (selectedCam) {
        const cam = CAMERAS.find(c => c.id === selectedCam);
        html += `
          <div class="cam-full-overlay show">
            <div class="cam-full-top">
              <div class="cam-full-title">CAM ${cam.id} — ${cam.name.toUpperCase()}</div>
              <button class="cam-full-close" onclick="selectedCam=null;render()">✕</button>
            </div>
            <div class="cam-full-view"><div class="cam-full-screen" style="background:linear-gradient(180deg,#050A18,#0A1525)"></div></div>
            <div class="cam-full-info">
              <span class="cam-info-chip live">● LIVE</span>
              <span class="cam-info-chip res">4K / H.264</span>
              <span class="cam-info-chip res">${cam.zone.toUpperCase()}</span>
              ${cam.status==='offline'?'<span class="cam-info-chip" style="color:var(--red);border-color:rgba(255,59,59,0.3);background:rgba(255,59,59,0.1)">OFFLINE</span>':''}
            </div>
          </div>
        `;
      }
      html += '</div>';
      document.getElementById('app').innerHTML = html;
    }
    function ackAlert(id) { alerts = alerts.map(a => a.id === id ? {...a, acked: true} : a); render(); }
    function sendChat() {
      if (!chatInput.trim()) return;
      chatMessages = [...chatMessages, {role:"user",text:chatInput}];
      chatLoading = true;
      chatInput = "";
      render();
      setTimeout(() => {
        const replies = ["Checking event logs... Person detected at Front-Right at 7:55 AM. No anomalies.","Patches is on routine — arrived at feeder at 8:31 AM, matching historical pattern.","One unknown plate today: 3RNZ019, sedan, passed at 6:01 AM. No match in database.","System healthy. 8 of 9 cameras online. Side Gate camera needs attention."];
        chatMessages = [...chatMessages,{role:"assistant",text:replies[Math.floor(Math.random()*replies.length)]}];
        chatLoading = false;
        render();
      }, 1500);
    }
    render();
  </script>
</body>
</html>
